  - function: plot_categ_differences
    parameters:
      main_dir: ["data/haupt_stim_activ/damaged/cornet_rt5_c/", "data/haupt_stim_activ/damaged/cornet_rt5_c+b/"]
      damage_layers: ["IT"]
      activations_layers: ["IT"]
      verbose: 0
      ylim: [-0.05,1]
      comparison: True
      scatter: True
      percentage: False
      selectivity_fraction: 0.05
      selection_mode: "percentage"
      damage_pairs:
        connections: ["0.0", "0.5"]
        noise: ["1.8"]
        units: ["0.4"]
      save_mode: "png+svg"
      line_colours:
        "connections, dmg=0.0": "#404040"
        "connections, dmg=0.5": "#A23B2A"
        "noise, dmg=1.8": "#4C6A2F"
        "units, dmg=0.4": "#6A4C93"

      point_markers:
        "connections, dmg=0.0": "o"
        "connections, dmg=0.5": "s"
        "noise, dmg=1.8": "^"
        "units, dmg=0.4": "D"
