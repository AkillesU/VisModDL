subdir: "study1_figs/"
tasks:
  - function: categ_corr_lineplot
    parameters:
      main_dir: "data/haupt_stim_activ/damaged/cornet_rt5_c+b/"
      damage_layers: ["V1","V2","V4","IT"]
      activations_layers: ["IT"]
      damage_type: "units"
      categories: ["total"]
      metric: "observed_difference"
      verbose: 0
      percentage: False
      ylim: [-0.05,0.25]
      data_type: "selectivity"
      selectivity_fraction: 0.05
      selection_mode: percentage
      model_tag: cornet_rt
      line_colours:
        V1: "#4D4D4D"
        V2: "#A34A28"
        V4: "#7A8F3A"
        IT: "#6A4C93"

      point_markers:
        V1: "X"
        V2: "P"
        V4: "v"
        IT: "*"
