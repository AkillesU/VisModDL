  - function: categ_corr_lineplot
    parameters:
      main_dir: "data/haupt_stim_activ/damaged/cornet_rt5_all/"
      damage_layers: ["V1"]
      activations_layers: ["IT"]
      damage_type: "eccentricity_0.30-1.00"
      categories: ["animal","face","object","place"]
      metric: "observed_difference"
      verbose: 0
      percentage: True
      data_type: "selectivity"
      flip_x_axis: False



      selectivity_fraction: 0.05
      line_colours:
        animals: "#009E73"
        objects: "#E69F00"
        places: "#0072B2"
        faces: "#CC79A7"
      point_markers:
        animals: "o"
        objects: "s"
        places: "^"
        faces: "D"
