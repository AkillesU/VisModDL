      <<: *lineplot_common
      percentage: True
      ylim: [-15, 115]
      scatter: false
      aggregate_by: ["damage_type", "stage"]
      aggregate_error: "sem"
      constituent_alpha: 0.16
      constituent_linewidth: 0.8
      aggregate_linewidth: 3.0
      title: "5% Selective Units: Early vs Late Damage"
      line_specs:
        - label: "ResNet-50 | Early | Connections"
          main_dir: "data/haupt_stim_activ/damaged/resnet50_c/"
          damage_layer: "block1"
          activation_layer: "layer4.2.relu"
          damage_type: "connections"
          model_tag: "resnet50"
          tags:
