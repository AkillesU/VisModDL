subdir: "new_models_c/"

lineplot_common: &lineplot_common
  categories: ["total"]
  metric: "observed_difference"
  verbose: 0
  percentage: False
  ylim: [-0.05, 0.25]
  data_type: "selectivity"
  selectivity_fraction: 0.05
  selection_mode: "percentage"

five_blocks: &five_blocks ["block1", "block2", "block3", "block4", "block5"]
latest_readout: &latest_readout ["avgpool"]

tasks:
  - function: categ_corr_lineplot
    parameters:
      <<: *lineplot_common
      main_dir: "data/haupt_stim_activ/damaged/resnet50_c/"
      damage_layers: *five_blocks
      activations_layers: "layer4.2.relu"
      damage_type: "connections"
      model_tag: "resnet50"
  - function: categ_corr_lineplot
    parameters:
      <<: *lineplot_common
      main_dir: "data/haupt_stim_activ/damaged/resnet50_c/"
      damage_layers: *five_blocks
      activations_layers: "layer4.2.relu"
      damage_type: "noise"
      model_tag: "resnet50"

  - function: categ_corr_lineplot
    parameters:
      <<: *lineplot_common
      main_dir: "data/haupt_stim_activ/damaged/resnet101_c/"
      damage_layers: *five_blocks
